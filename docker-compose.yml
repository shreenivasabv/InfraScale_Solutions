version: "3.8"

services:

  backend:
    build: ./backend
    container_name: infrascale-backend
    ports:
      - "8000:5000"
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    build: ./frontend
    container_name: infrascale-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: always